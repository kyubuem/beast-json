name: "CodeQL Static Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0' # 매주 일요일 새벽 정기 검사

jobs:
  analyze:
    name: Analyze C++ with CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,c-cpp-memory-leak,c-cpp-bounds-check

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBEAST_BUILD_TESTS=ON

    - name: Build Code for Analysis
      run: cmake --build build -j4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
