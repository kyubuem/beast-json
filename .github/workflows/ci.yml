name: C++20 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        build_type: [Release, Debug]
        compiler: [gcc, clang, msvc, apple-clang]
        include:
          # Specific compiler versions and CC/CXX exports
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
        exclude:
          # Exclude combinations that don't make sense
          - os: ubuntu-latest
            compiler: msvc
          - os: ubuntu-latest
            compiler: apple-clang
          - os: macos-latest
            compiler: msvc
          - os: macos-latest
            compiler: gcc
          - os: macos-latest
            compiler: clang
          - os: macos-13
            compiler: msvc
          - os: macos-13
            compiler: gcc
          - os: macos-13
            compiler: clang
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
          - os: windows-latest
            compiler: apple-clang

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Compilers (Ubuntu)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-13
        
    - name: Install Compilers (Ubuntu Clang)
      if: runner.os == 'Linux' && matrix.compiler == 'clang'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 17
        
    - name: Configure CMake
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBEAST_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} -j4

    - name: Test
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure
